apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service

spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: order-service

  template:
    metadata:
      labels:
        app: order-service

    spec:
      containers:
        - name: order-service
          image: order-service:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 3004

          envFrom:
            - configMapRef:
                name: order-service-config
            - secretRef:
                name: app-secrets